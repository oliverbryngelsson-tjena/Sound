<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🔥 TURN DOWN FOR WHAT 🔥</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #ff0022;
      --yellow: #ffe600;
      --black: #0a0a0a;
    }

    body {
      background: var(--black);
      color: var(--yellow);
      font-family: 'Bebas Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* Animated noise grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.25;
      z-index: 999;
      animation: grain 0.15s steps(1) infinite;
    }

    @keyframes grain {
      0%  { transform: translate(0,0); }
      10% { transform: translate(-2%,-3%); }
      20% { transform: translate(3%, 2%); }
      30% { transform: translate(-1%, 4%); }
      40% { transform: translate(4%,-1%); }
      50% { transform: translate(-3%, 3%); }
      60% { transform: translate(2%,-4%); }
      70% { transform: translate(-4%, 1%); }
      80% { transform: translate(3%, 3%); }
      90% { transform: translate(-2%,-2%); }
      100%{ transform: translate(1%, 4%); }
    }

    /* Pulsing background flash */
    .bg-flash {
      position: fixed;
      inset: 0;
      background: var(--red);
      opacity: 0;
      z-index: 0;
      animation: flash 0.8s ease-in-out infinite;
    }

    @keyframes flash {
      0%   { opacity: 0; }
      45%  { opacity: 0; }
      50%  { opacity: 0.12; }
      55%  { opacity: 0; }
      100% { opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .kid-gif {
      width: clamp(200px, 60vw, 600px);
      height: auto;
      animation: shake 0.08s linear infinite;
      filter: drop-shadow(0 0 30px var(--red));
    }

    @keyframes shake {
      0%   { transform: translate(0,0) rotate(0deg); }
      20%  { transform: translate(-2px, 2px) rotate(-0.5deg); }
      40%  { transform: translate(2px,-2px) rotate(0.5deg); }
      60%  { transform: translate(-1px, 3px) rotate(-0.3deg); }
      80%  { transform: translate(3px,-1px) rotate(0.3deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }

    .subtitle {
      font-size: clamp(1.2rem, 4vw, 2.5rem);
      letter-spacing: 0.4em;
      color: var(--red);
      text-transform: uppercase;
      animation: blink 1.2s step-end infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    .fire-row {
      font-size: clamp(2rem, 6vw, 5rem);
      animation: bounce 0.4s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 20px orange);
    }

    @keyframes bounce {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-12px) scale(1.15); }
    }

    /* Mute toggle button */
    .mute-btn {
      margin-top: 1.5rem;
      background: transparent;
      border: 3px solid var(--yellow);
      color: var(--yellow);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      padding: 0.6rem 2rem;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      position: relative;
      z-index: 20;
    }
    .mute-btn:hover {
      background: var(--yellow);
      color: var(--black);
    }

    /* Scanlines */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.25) 2px,
        rgba(0,0,0,0.25) 4px
      );
      pointer-events: none;
      z-index: 998;
    }

    /* Custom cursor */
    .cursor {
      width: 20px;
      height: 20px;
      border: 2px solid var(--yellow);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
      mix-blend-mode: difference;
    }

    /* Autoplay blocked overlay */
    #unblock {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 10000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      text-align: center;
      padding: 2rem;
    }
    #unblock.visible { display: flex; }
    #unblock button {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: var(--black);
      border: none;
      color: var(--yellow);
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(3rem, 12vw, 10rem);
      letter-spacing: 0.05em;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      animation: pulse-btn 0.8s ease-in-out infinite alternate;
      line-height: 1;
    }
    #unblock button span {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 3vw, 2rem);
      letter-spacing: 0.4em;
      color: var(--red);
    }
    @keyframes pulse-btn {
      from { background: #0a0a0a; }
      to   { background: #1a0000; }
    }
  </style>
</head>
<body>

  <div class="bg-flash"></div>
  <div class="scanlines"></div>
  <div class="cursor" id="cursor"></div>

  <!-- Autoplay blocked fallback -->
  <div id="unblock">
    <button onclick="startAudio()">🔊<span>TRYCK VAR SOM HELST FÖR ATT STARTA</span></button>
  </div>

  <div class="container">
    <div class="fire-row">🔥🔥🔥</div>
    <img src="kid.gif" alt="" class="kid-gif" />
    <div class="subtitle">⚡ NOW PLAYING ⚡</div>
    <div class="fire-row">🔥🔥🔥</div>
    <button class="mute-btn" onclick="toggleMute()" id="muteBtn">🔊 MUTE</button>
  </div>

  <audio id="audio" loop preload="auto">
    <source src="turndownforwhat.mp3" type="audio/mpeg"/>
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const unblock = document.getElementById('unblock');
    const muteBtn = document.getElementById('muteBtn');

    audio.volume = 1.0;

    // Try autoplay immediately
    audio.play().catch(() => {
      // Browser blocked autoplay — show overlay
      unblock.classList.add('visible');
    });

    function startAudio() {
      audio.volume = 1.0;
      audio.play();
      unblock.classList.remove('visible');
    }

    function toggleMute() {
      if (audio.muted) {
        audio.muted = false;
        muteBtn.textContent = '🔊 MUTE';
      } else {
        audio.muted = true;
        muteBtn.textContent = '🔇 UNMUTE';
      }
    }

    // Custom cursor
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>

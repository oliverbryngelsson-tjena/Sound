<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turn Down For What</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    img {
      width: clamp(200px, 60vw, 600px);
      height: auto;
      animation: shake 0.08s linear infinite;
    }

    @keyframes shake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      20%  { transform: translate(-3px, 3px) rotate(-0.5deg); }
      40%  { transform: translate(3px, -3px) rotate(0.5deg); }
      60%  { transform: translate(-2px, 4px) rotate(-0.3deg); }
      80%  { transform: translate(4px, -2px) rotate(0.3deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    #unblock {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999;
    }
    #unblock.visible { display: block; }
    #unblock button {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div id="unblock">
    <button onclick="startAudio()"></button>
  </div>

  <img src="kid.gif" alt="" />

  <audio id="audio" loop preload="auto">
    <source src="turndownforwhat.mp3" type="audio/mpeg"/>
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const unblock = document.getElementById('unblock');

    audio.volume = 1.0;

    audio.play().catch(() => {
      unblock.classList.add('visible');
    });

    function startAudio() {
      audio.volume = 1.0;
      audio.play();
      unblock.classList.remove('visible');
    }
  </script>
</body>
</html>
